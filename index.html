<!DOCTYPE html>
<html>
<head>
<title>Student Results with GPA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
  background-image: url(./images/flat-illustration-vintage-postcardinternational-midwives-day-pregnant-woman-white-dress-flowers-blue-background-copy-space-free-space-text_595836-3796.avif);
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
}

/* LOGIN */
.login-box {
  width: 450px;
  margin: auto;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 5px #000;
  margin-top: 10%;
  background: white;
}

input {
  padding: 10px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

.login-box h2 {
  font-size: 30px;
  text-align: center;
}

button {
  padding: 10px 18px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn { background: teal; color: white; }
.logout { background: red; color: white; }

/* RESULT PAGE (UNCHANGED) */
.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 8px;
}

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

.table th, .table td {
  border: 1px solid #3a3a3a;
  padding: 10px;
  text-align: center;
}

.gpa {
  margin-top: 15px;
  font-weight: bold;
  font-size: 18px;
}

/* ✅ MOBILE (LOGIN ONLY) */
@media (max-width: 768px) {

  .login-box {
    width: 95%;
    margin-top: 40%;
    padding: 15px;
  }

  input {
    font-size: 16px;
  }

  button {
    width: 100%;
  }

}

</style>
</head>

<body>

<div id="loginDiv" class="login-box">
  <h2>NPUC Student Login</h2>
  <input id="sid" placeholder="Enter ID ">
  <input id="pass" type="text" placeholder="Enter password ">
  <button class="btn" onclick="login()">Login</button>
</div>

<div id="resultDiv" class="container" style="display:none;">
  <h2 id="title"></h2>

  <table class="table">
    <tr>
      <th>#Course</th>
      <th>Quiz</th>
      <th>C.activity</th>
      <th>Mid</th>
      <th>Final</th>
      <th>Total</th>
      <th>Grade</th>
    </tr>
    <tbody id="courseRows"></tbody>
  </table>

  <div class="gpa" id="gpaDiv"></div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>

const students = {
  "0026": {pass: "0026", name: "Rahma Adan Nour", results: [[0,20,30,50],[0,20,27,50],[0,20,28,42],[0,20,30,46],[0,20,30,46]]},
  "0032": {pass: "0032", name: "Deqa Ali Husein", results: [[0,20,29,48],[0,20,29.5,48.5],[0,20,28,45],[0,18.5,26,38],[0,17,24,38]]}
};

const courseNames = ["Intro-midwifery", "Early-Pregnancy", "Basic-Skills", "A.Physiology", "G.Microbiology"];

let currentStudent = null;

function login() {
  let id = sid.value.trim();
  let pw = pass.value.trim();

  if (students[id] && students[id].pass === pw) {
    currentStudent = id;
    showResults();
  } else {
    alert("ID ama Password waa qalad.");
  }
}

function showResults() {
  loginDiv.style.display = "none";
  resultDiv.style.display = "block";

  title.innerHTML = "Welcome: " + students[currentStudent].name;

  let rows = "";
  let r = students[currentStudent].results;
  let totalPoints = 0;

  for (let i = 0; i < courseNames.length; i++) {
    let att = r[i][0], cls = r[i][1], asg = r[i][2], fin = r[i][3];
    let total = att + cls + asg + fin;
    let grade = gradeMark(total);
    totalPoints += gradeToPoint(grade);

    rows += `
    <tr>
      <td><input readonly value="${courseNames[i]}"></td>
      <td><input readonly value="${att}"></td>
      <td><input readonly value="${cls}"></td>
      <td><input readonly value="${asg}"></td>
      <td><input readonly value="${fin}"></td>
      <td><input readonly value="${total}"></td>
      <td><input readonly value="${grade}"></td>
    </tr>`;
  }

  courseRows.innerHTML = rows;

  let gpa = (totalPoints / courseNames.length).toFixed(2);
  gpaDiv.innerHTML = "GPA: " + gpa;
}

function gradeMark(t) {
  if (t >= 85) return "A";
  if (t >= 70) return "B";
  if (t >= 55) return "C";
  if (t >= 50) return "D";
  return "F";
}

function gradeToPoint(g){
  if(g==="A") return 4;
  if(g==="B") return 3;
  if(g==="C") return 2;
  if(g==="D") return 1;
  return 0;
}

function logout() {
  currentStudent = null;
  loginDiv.style.display = "block";
  resultDiv.style.display = "none";
}

</script>

</body>
</html>
